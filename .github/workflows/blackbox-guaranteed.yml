name: Black Box - GUARANTEED CRASHES

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  blackbox:
    name: Black Box Fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O2 -fno-stack-protector -z execstack -o target vulnerable.c
          chmod +x target
      
      - name: Create corpus
        run: |
          mkdir -p corpus crashes
          echo "test" > corpus/input1.txt
          echo "AAAA" > corpus/input2.txt
          echo "CRASH" > corpus/crash_trigger.txt
          python3 -c "print('A' * 200)" > corpus/large.txt
      
      - name: Run Black Box Fuzzing
        id: fuzz
        run: |
          cd blackbox-target
          CRASH_COUNT=0
          
          for i in $(seq 1 300); do
            # Берём случайный input
            SEED=$(ls corpus | shuf -n 1)
            cp corpus/$SEED /tmp/mutated.txt
            
            # Добавляем случайные данные
            dd if=/dev/urandom bs=1 count=$((RANDOM % 100)) >> /tmp/mutated.txt 2>/dev/null
            
            # Запускаем
            timeout 1s ./target /tmp/mutated.txt > /dev/null 2>&1
            EXIT_CODE=$?
            
            # Проверяем краш
            if [ $EXIT_CODE -eq 134 ] || [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 136 ]; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "CRASH #$CRASH_COUNT (iter $i, exit $EXIT_CODE)"
              cp /tmp/mutated.txt crashes/crash_$(printf "%03d" $CRASH_COUNT).txt
            fi
            
            if [ $((i % 50)) -eq 0 ]; then
              echo "Progress: $i/300 | Crashes: $CRASH_COUNT"
            fi
          done
          
          echo "Total crashes: $CRASH_COUNT"
          echo "count=$CRASH_COUNT" >> $GITHUB_OUTPUT
      
      - name: Show results
        run: |
          cd blackbox-target
          echo ""
          echo "RESULTS:"
          ls -lh crashes/ | head -10
          echo ""
          echo "Total: $(ls -1 crashes/ | wc -l) crashes"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-crashes
          path: |
            blackbox-target/crashes/
            blackbox-target/corpus/
