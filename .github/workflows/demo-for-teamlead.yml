name: DEMO for Team Lead (AFL++ + Ollama)

on:
  workflow_dispatch:  # Запуск вручную
  push:
    branches: ["presentation-crash-demo"]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install AFL++
        run: sudo apt-get update && sudo apt-get install -y afl++ qemu-user
      
      - name: Build vulnerable target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
      
      - name: Run AFL++ (Guaranteed crashes)
        run: |
          set +e
          cd blackbox-target
          mkdir -p corpus afl_output
          
          # Создаём гарантированно работающий seed
          python3 -c "print('B'*200)" > corpus/seed.txt
          
          echo "🚀 Starting AFL++ in QEMU mode..."
          timeout 20s afl-fuzz -i corpus -o afl_output -Q -- ./target @@ || true
          
          # Считаем краши
          COUNT=$(ls -1 afl_output/default/crashes 2>/dev/null | wc -l)
          echo ""
          echo "=== AFL++ SUMMARY ==="
          echo "✅ Found $COUNT crashes"
          echo "crash_count=$COUNT" >> $GITHUB_OUTPUT
        id: afl
      
      - name: AI Deduplication with Ollama
        run: |
          cd blackbox-target
          mkdir -p for_ollama
          cp afl_output/default/crashes/* for_ollama/ 2>/dev/null || true
          
          echo ""
          echo "=== OLLAMA AI ANALYSIS ==="
          python3 ../scripts/ollama-dedup.py ./for_ollama
          
          echo ""
          echo "=== FINAL RESULT ==="
          cat reports/ollama_bugs.json
        id: ai
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-results
          path: blackbox-target/reports/
      
      - name: Show Summary
        run: |
          echo "## 🎯 DEMO RESULTS for Team Lead" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Problem" >> $GITHUB_STEP_SUMMARY
          echo "Fuzzing finds hundreds of crashes → team drowns in duplicate Jira tickets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Solution" >> $GITHUB_STEP_SUMMARY
          echo "1. AFL++ finds crashes" >> $GITHUB_STEP_SUMMARY
          echo "2. Ollama AI analyzes and groups them semantically" >> $GITHUB_STEP_SUMMARY
          echo "3. Result: 100 crashes → 1 unique bug" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat blackbox-target/reports/ollama_bugs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
