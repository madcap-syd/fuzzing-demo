name: 03-BlackBox-Optimized (Production)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  blackbox-optimized:
    name: AFL++ Production
    runs-on: ubuntu-latest
    container: aflplusplus/aflplusplus:latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Fix core_pattern
        run: |
          echo "core" > /proc/sys/kernel/core_pattern 2>/dev/null || true

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target
          file target

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          echo "AAAA" > corpus/seed2.txt
          python3 -c "print('B'*10)" > corpus/seed3.txt

      - name: Run AFL++ Fuzzing
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Prepare and Count Crashes
        id: prepare
        run: |
          cd blackbox-target
          mkdir -p flat_crashes unique_crashes reports
          
          count=0
          for f in afl_out/default/crashes/*; do
            if [ -f "$f" ]; then
              count=$((count + 1))
              safe_name=$(basename "$f" | tr ':<>"|?*' '_______')
              cp "$f" "flat_crashes/$safe_name"
            fi
          done
          
          echo "crash_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count crashes"

      - name: Local Deduplication
        if: steps.prepare.outputs.crash_count > 0
        id: dedup
        run: |
          cd blackbox-target
          
          unique=0
          for f in flat_crashes/*; do
            if [ -f "$f" ]; then
              unique=$((unique + 1))
              size=$(stat -c%s "$f" 2>/dev/null || echo "0")
              cp "$f" "unique_crashes/crash_${unique}_size${size}.txt"
            fi
          done
          
          echo "unique_count=$unique" >> $GITHUB_OUTPUT
          
          cat > reports/dedup_report.json << JSONEOF
{
  "method": "Local Deduplication",
  "raw_crashes": ${{ steps.prepare.outputs.crash_count }},
  "unique_crashes": $unique,
  "security": "No external API"
}
JSONEOF

      - name: Upload Artifacts
        if: steps.prepare.outputs.crash_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: optimized-results
          path: |
            blackbox-target/flat_crashes/
            blackbox-target/unique_crashes/
            blackbox-target/reports/
          retention-days: 30

      - name: Generate Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << MDEOF
## 🎯 BlackBox Optimized Results

### Statistics
| Metric | Value |
|--------|-------|
| Tool | AFL++ (Docker) |
| Duration | 180 sec |
| Crashes | ${{ steps.prepare.outputs.crash_count }} |
| Unique | ${{ steps.dedup.outputs.unique_count }} |
| Security | Local only |

### Features
✅ Docker image (fast startup)
✅ No external API calls
✅ Production ready
✅ 30 days artifact retention
MDEOF
