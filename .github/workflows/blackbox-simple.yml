name: Black Box Simple Fuzzing

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  blackbox-fuzz:
    name: Black Box Fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O2 -fno-stack-protector -z execstack -o target vulnerable.c
          chmod +x target
      
      - name: Create corpus
        run: |
          mkdir -p corpus crashes
          echo "test" > corpus/input1.txt
          echo "AAAA" > corpus/input2.txt
          echo "BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB" > corpus/input3.txt
          echo "CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC" > corpus/input4.txt
      
      - name: Run Black Box Fuzzing
        id: fuzz
        run: |
          cd blackbox-target
          CRASH_COUNT=0
          
          for i in {1..300}; do
            SEED=$(ls ../corpus | shuf -n 1)
            cp ../corpus/$SEED /tmp/mutated.txt
            dd if=/dev/urandom bs=1 count=$((RANDOM % 200 + 10)) >> /tmp/mutated.txt 2>/dev/null
            
            timeout 1s ./target /tmp/mutated.txt > /dev/null 2>&1
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 134 ] || [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 136 ]; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "CRASH #$CRASH_COUNT (iteration $i)"
              cp /tmp/mutated.txt crashes/crash_$(printf "%03d" $CRASH_COUNT).txt
            fi
          done
          
          echo "Total crashes: $CRASH_COUNT"
          echo "count=$CRASH_COUNT" >> $GITHUB_OUTPUT
      
      - name: Analyze crashes
        if: steps.fuzz.outputs.count > 0
        run: |
          cd blackbox-target
          mkdir -p unique
          
          declare -A sizes
          for crash in crashes/*; do
            if [ -f "$crash" ]; then
              size=$(stat -c%s "$crash")
              if [ -z "${sizes[$size]}" ]; then
                sizes[$size]="$crash"
                cp "$crash" unique/
              fi
            fi
          done
          
          UNIQUE=$(ls -1 unique/ | wc -l)
          echo "Unique crashes: $UNIQUE"
          echo "unique=$UNIQUE" >> $GITHUB_OUTPUT
      
      - name: Generate report
        if: steps.fuzz.outputs.count > 0
        run: |
          cd blackbox-target
          echo "BLACK BOX FUZZING REPORT" > report.txt
          echo "========================" >> report.txt
          echo "Date: $(date)" >> report.txt
          echo "Total crashes: ${{ steps.fuzz.outputs.count }}" >> report.txt
          echo "Unique crashes: ${{ steps.fuzz.outputs.unique }}" >> report.txt
          echo "Vulnerability: Buffer Overflow (CWE-120)" >> report.txt
          cat report.txt
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-results
          path: |
            blackbox-target/crashes/
            blackbox-target/unique/
            blackbox-target/report.txt
