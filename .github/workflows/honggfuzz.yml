name: HonggFuzz Security Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration in seconds'
        required: false
        default: '3600'

jobs:
  honggfuzz:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          binutils-dev \
          libunwind-dev \
          libblocksruntime-dev \
          libdisasm-dev \
          libtool-bin
    
    - name: Build HonggFuzz
      run: |
        git clone https://github.com/google/honggfuzz.git
        cd honggfuzz
        make -j$(nproc)
        sudo make install
        sudo ldconfig
        cd ..
    
    - name: Build target with HonggFuzz
      run: |
        cd fuzz-cpp
        # Используем hfuzz-clang++ который автоматически подключает библиотеки
        hfuzz-clang++ -fsanitize=address,undefined -O1 -g -std=c++17 \
          src/packet_parser.cpp src/hfuzz_harness.cpp \
          -o hfuzzer || \
        # Fallback: компиляция с явным указанием путей
        clang++ -fsanitize=address,undefined -O1 -g -std=c++17 \
          src/packet_parser.cpp src/hfuzz_harness.cpp \
          -I/usr/local/include/libhfuzz \
          -L/usr/local/lib -lhfuzz \
          -lpthread \
          -o hfuzzer
        
        mkdir -p corpus crashes
        cp corpus/* corpus/ 2>/dev/null || true
    
    - name: Run HonggFuzz
      run: |
        cd fuzz-cpp
        DURATION=${{ github.event.inputs.duration || 60 }}
        
        honggfuzz --persistent \
          --input corpus \
          --output crashes \
          --threads 2 \
          --timeout 10 \
          --run_time $DURATION \
          -- ./hfuzzer 2>&1 | tee honggfuzz.log || true
    
    - name: Parse crashes
      if: always()
      run: |
        python3 scripts/parse_honggfuzz_crashes.py \
          --crashes-dir fuzz-cpp/crashes \
          --output fuzz_results.json || echo "No crashes to parse"
    
    - name: Upload to DefectDojo
      if: always()
      env:
        DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
        DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      run: |
        python3 scripts/upload_to_defectdojo.py \
          --results fuzz_results.json \
          --product "Packet Parser" \
          --engagement "HonggFuzz CI/CD" || echo "DefectDojo upload skipped"
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzzing-results
        path: |
          fuzz-cpp/honggfuzz.log
          fuzz_results.json
          fuzz-cpp/crashes/
        if-no-files-found: ignore
