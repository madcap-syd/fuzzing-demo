name: 02-BlackBox-Fuzzing (AFL++ + AI Dedup)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++ from source (with QEMU)
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 python3-pip wget \
            pkg-config libglib2.0-dev libpixman-1-dev libtool libtool-bin \
            autoconf automake meson ninja-build
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          make distrib -j$(nproc)
          sudo make install
          cd qemu_mode
          ./build_qemu_support.sh
          afl-fuzz --version

      - name: Fix core_pattern
        run: echo "core" | sudo tee /proc/sys/kernel/core_pattern

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          python3 -c "print('B'*10)" > corpus/seed2.txt

      - name: Run AFL++ (180 sec)
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Count and Prepare Crashes
        run: |
          cd blackbox-target
          mkdir -p flat_crashes reports
          
          COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | grep -c '^id:' || echo "0")
          echo "🎯 Found $COUNT crashes"
          echo "crash_count=$COUNT" >> $GITHUB_OUTPUT
          
          # ПЕРЕИМЕНОВЫВАЕМ файлы (убираем ВСЕ спецсимволы)
          for f in afl_out/default/crashes/*; do
            if [ -f "$f" ]; then
              safe_name=$(basename "$f" | tr ':<>"|?*' '_______')
              cp "$f" "flat_crashes/$safe_name"
            fi
          done
          
          echo "✅ Prepared $(ls flat_crashes/ | wc -l) files"
        id: count

      - name: AI Deduplication
        if: steps.count.outputs.crash_count > 0
        run: |
          cd blackbox-target
          python3 ../scripts/ollama-dedup.py flat_crashes 2>/dev/null || echo "AI dedup skipped"
          [ -f reports/ollama_bugs.json ] && cat reports/ollama_bugs.json | python3 -m json.tool || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-results
          path: |
            blackbox-target/flat_crashes/
            blackbox-target/reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## 🎯 BlackBox Results" >> $GITHUB_STEP_SUMMARY
          echo "**Crashes:** ${{ steps.count.outputs.crash_count }}" >> $GITHUB_STEP_SUMMARY
