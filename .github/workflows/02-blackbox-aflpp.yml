name: 02-BlackBox-Fuzzing (AFL++)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  blackbox:
    runs-on: self-hosted
    container: aflplusplus/aflplusplus:latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Check Environment
        run: |
          echo "=== Self-Hosted Runner with Docker ==="
          uname -a
          afl-fuzz --version || echo "AFL++ ready"

      - name: Fix core_pattern
        run: |
          echo "core" > /proc/sys/kernel/core_pattern 2>/dev/null || true

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target
          echo "Target built successfully"

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          echo "AAAA" > corpus/seed2.txt
          python3 -c "print('B'*10)" > corpus/seed3.txt
          echo "Corpus created"

      - name: Run AFL++ (180 sec)
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Analyze and Deduplicate
        id: analyze
        shell: bash
        run: |
          cd blackbox-target
          mkdir -p unique_crashes reports flat_crashes
          
          RAW_COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
          echo "Raw crashes: $RAW_COUNT"
          
          # Копируем и переименовываем файлы (убираем двоеточия!)
          UNIQUE_COUNT=0
          declare -A seen_hashes
          
          for f in afl_out/default/crashes/*; do
            if [ -f "$f" ]; then
              hash=$(md5sum "$f" | cut -d' ' -f1)
              size=$(stat -c%s "$f")
              key="${hash}_${size}"
              
              if [ -z "${seen_hashes[$key]}" ]; then
                seen_hashes[$key]=1
                UNIQUE_COUNT=$((UNIQUE_COUNT + 1))
                
                # Создаем безопасное имя (убираем : и другие спецсимволы)
                safe_name="crash_$(printf '%06d' $UNIQUE_COUNT)_size_${size}.txt"
                cp "$f" "unique_crashes/$safe_name"
                
                # Также копируем в flat_crashes с безопасным именем для артефактов
                flat_name=$(basename "$f" | tr ':<>"|?*' '_______')
                cp "$f" "flat_crashes/$flat_name"
              fi
            fi
          done
          
          DUPLICATES=$((RAW_COUNT - UNIQUE_COUNT))
          DEDUP_RATE=0
          [ "$RAW_COUNT" -gt 0 ] && DEDUP_RATE=$((DUPLICATES * 100 / RAW_COUNT))
          
          echo "raw_count=$RAW_COUNT" >> $GITHUB_OUTPUT
          echo "unique_count=$UNIQUE_COUNT" >> $GITHUB_OUTPUT
          echo "duplicates=$DUPLICATES" >> $GITHUB_OUTPUT
          echo "dedup_rate=$DEDUP_RATE" >> $GITHUB_OUTPUT
          
          echo "Raw: $RAW_COUNT, Unique: $UNIQUE_COUNT, Dedup: ${DEDUP_RATE}%"
          ls -lh flat_crashes/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results
          path: |
            blackbox-target/flat_crashes/
            blackbox-target/unique_crashes/
            blackbox-target/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "##  BlackBox Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | Self-Hosted + Docker |" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | AFL++ |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | 180 sec |" >> $GITHUB_STEP_SUMMARY
          echo "| Raw crashes | \${{ steps.analyze.outputs.raw_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unique | \${{ steps.analyze.outputs.unique_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dedup rate | \${{ steps.analyze.outputs.dedup_rate }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download crash files from the Artifacts section above!" >> $GITHUB_STEP_SUMMARY
