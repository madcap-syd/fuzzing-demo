name: 02-BlackBox-Fuzzing (Production + Jira)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++ from source (with QEMU)
        run: |
          echo "🔧 Installing dependencies..."
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 python3-pip wget \
            pkg-config libglib2.0-dev libpixman-1-dev libtool libtool-bin \
            autoconf automake meson ninja-build
          
          echo "📥 Cloning AFL++..."
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          
          echo "🔨 Building AFL++..."
          make distrib -j$(nproc)
          sudo make install
          
          echo "🔨 Building QEMU mode..."
          cd qemu_mode
          ./build_qemu_support.sh
          
          echo "✅ AFL++ installed successfully!"
          afl-fuzz --version

      - name: Fix core_pattern
        run: echo "core" | sudo tee /proc/sys/kernel/core_pattern

      - name: Build Target (Black Box)
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target
          file target

      - name: Create Safe Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          echo "AAAA" > corpus/seed2.txt
          python3 -c "print('B'*10)" > corpus/seed3.txt

      - name: Run AFL++ (180 sec)
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          echo "🚀 Starting AFL++ in QEMU mode for 3 minutes..."
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true
          echo "✅ AFL++ finished"

      - name: Count and Deduplicate Crashes
        id: analyze
        run: |
          cd blackbox-target
          mkdir -p unique_crashes reports
          
          echo "📊 Analyzing crashes..."
          RAW_COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
          echo "Raw crashes found: $RAW_COUNT"
          
          # Дедупликация по hash + size
          declare -A seen_hashes
          UNIQUE_COUNT=0
          
          for crash_file in afl_out/default/crashes/*; do
            if [ -f "$crash_file" ]; then
              file_hash=$(md5sum "$crash_file" | cut -d' ' -f1)
              file_size=$(stat -c%s "$crash_file")
              dedup_key="${file_hash}_${file_size}"
              
              if [ -z "${seen_hashes[$dedup_key]}" ]; then
                seen_hashes[$dedup_key]=1
                UNIQUE_COUNT=$((UNIQUE_COUNT + 1))
                
                # Копируем с безопасным именем
                safe_name="crash_$(printf '%06d' $UNIQUE_COUNT)_size_${file_size}.txt"
                cp "$crash_file" "unique_crashes/$safe_name"
              fi
            fi
          done
          
          DUPLICATES=$((RAW_COUNT - UNIQUE_COUNT))
          DEDUP_RATE=0
          if [ "$RAW_COUNT" -gt 0 ]; then
            DEDUP_RATE=$((DUPLICATES * 100 / RAW_COUNT))
          fi
          
          echo "raw_count=$RAW_COUNT" >> $GITHUB_OUTPUT
          echo "unique_count=$UNIQUE_COUNT" >> $GITHUB_OUTPUT
          echo "duplicates=$DUPLICATES" >> $GITHUB_OUTPUT
          echo "dedup_rate=$DEDUP_RATE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=== DEDUPLICATION RESULTS ==="
          echo "  Raw crashes:    $RAW_COUNT"
          echo "  Unique crashes: $UNIQUE_COUNT"
          echo "  Duplicates:     $DUPLICATES"
          echo "  Dedup rate:     ${DEDUP_RATE}%"
          echo ""
          
          # Генерируем отчёт
          cat > reports/fuzzing_report.json << JSONEOF
{
  "tool": "AFL++ (QEMU mode)",
  "duration_seconds": 180,
  "raw_crashes": $RAW_COUNT,
  "unique_crashes": $UNIQUE_COUNT,
  "duplicates_removed": $DUPLICATES,
  "dedup_rate_percent": $DEDUP_RATE,
  "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
  "target_binary": "blackbox-target/target",
  "vulnerability_type": "Buffer Overflow (detected by AFL++)"
}
JSONEOF
          
          echo "📄 Report saved to reports/fuzzing_report.json"
          cat reports/fuzzing_report.json

      - name: Create Jira Tickets (if configured)
        if: steps.analyze.outputs.unique_count > 0 && env.JIRA_TOKEN != ''
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
        run: |
          cd blackbox-target
          echo " Creating Jira tickets..."
          
          # Создаём тикет для каждого уникального краша
          for i in $(seq 1 ${{ steps.analyze.outputs.unique_count }}); do
            crash_file="unique_crashes/crash_$(printf '%06d' $i)_size_*.txt"
            crash_file=$(ls $crash_file 2>/dev/null | head -1)
            
            if [ -f "$crash_file" ]; then
              size=$(stat -c%s "$crash_file")
              
              # Создаём JSON для Jira API
              cat > /tmp/jira_issue.json << JIRAEOL
{
  "fields": {
    "project": {"key": "$JIRA_PROJECT"},
    "summary": "Fuzzing: Crash #$i - Buffer Overflow (size: $size bytes)",
    "description": "AFL++ fuzzing detected a crash in the target binary.\n\n**Details:**\n- Crash ID: #$i\n- Input size: $size bytes\n- Severity: Critical\n- CWE: 120 (Buffer Copy without Checking Size)\n- CVSS: 9.8 (Critical)\n\n**Reproduction:**\nSee attached crash file.",
    "issuetype": {"name": "Bug"},
    "priority": {"name": "Highest"},
    "labels": ["fuzzing", "security", "aflpp", "buffer-overflow"]
  }
}
JIRAEOL
              
              # Отправляем в Jira (если токены настроены)
              # curl -u "$JIRA_TOKEN" -X POST -H "Content-Type: application/json" \
              #   --data @/tmp/jira_issue.json "$JIRA_URL/rest/api/2/issue"
              
              echo "  ✅ Would create Jira ticket for crash #$i (size: $size)"
            fi
          done
          
          echo "✅ Jira integration complete (dry run - enable with secrets)"

      - name: Upload to DefectDojo (if configured)
        if: steps.analyze.outputs.unique_count > 0 && env.DD_URL != ''
        env:
          DD_URL: ${{ secrets.DD_URL }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_PRODUCT_ID: ${{ secrets.DD_PRODUCT_ID }}
        run: |
          cd blackbox-target
          echo " Uploading to DefectDojo..."
          
          # Создаём отчёт в формате DefectDojo
          cat > /tmp/defectdojo_report.json << DDEOF
{
  "title": "AFL++ Fuzzing Results - $(date +%Y-%m-%d)",
  "description": "Automated fuzzing found ${{ steps.analyze.outputs.unique_count }} unique crashes",
  "severity": "Critical",
  "findings": [
    {
      "title": "Buffer Overflow via Fuzzing",
      "description": "AFL++ fuzzer detected ${{ steps.analyze.outputs.unique_count }} unique buffer overflow vulnerabilities",
      "severity": "Critical",
      "cwe": 120,
      "cvssv3": 9.8,
      "file_path": "blackbox-target/target",
      "line": 0,
      "component_name": "target_binary",
      "static_finding": false,
      "active": true,
      "verified": true,
      "duplicate": false
    }
  ]
}
DDEOF
          
          # Отправляем в DefectDojo (если настроено)
          # curl -X POST "$DD_URL/api/v2/findings/" \
          #   -H "Authorization: Token $DD_API_KEY" \
          #   -H "Content-Type: application/json" \
          #   --data @/tmp/defectdojo_report.json
          
          echo "✅ DefectDojo upload complete (dry run - enable with secrets)"

      - name: Send Email Notifications (if configured)
        if: steps.analyze.outputs.unique_count > 0 && env.SMTP_SERVER != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          echo " Sending email notifications..."
          
          cat > /tmp/email_body.txt << EMAILEOF
Subject: [SECURITY] Fuzzing Alert - ${{ steps.analyze.outputs.unique_count }} Crashes Detected

Dear Development Team,

Automated fuzzing has detected ${{ steps.analyze.outputs.unique_count }} unique crashes in the target binary.

SUMMARY:
--------
- Tool: AFL++ (QEMU mode)
- Duration: 180 seconds
- Raw crashes: ${{ steps.analyze.outputs.raw_count }}
- Unique crashes: ${{ steps.analyze.outputs.unique_count }}
- Duplicates removed: ${{ steps.analyze.outputs.duplicates }}
- Dedup rate: ${{ steps.analyze.outputs.dedup_rate }}%

SEVERITY: Critical
CWE: 120 (Buffer Copy without Checking Size)
CVSS: 9.8

ACTION REQUIRED:
---------------
1. Review the attached crash files
2. Analyze root cause
3. Implement fixes
4. Update Jira tickets

See GitHub Actions for detailed artifacts.

---
Automated Security Fuzzing Pipeline
EMAILEOF
          
          # Отправляем email (если настроено)
          # echo "Sending to: $NOTIFY_EMAIL"
          # curl smtp://$SMTP_SERVER:$SMTP_PORT \
          #   --mail-from "fuzzing@company.com" \
          #   --mail-rcpt "$NOTIFY_EMAIL" \
          #   --upload-file /tmp/email_body.txt \
          #   --user "$SMTP_USER:$SMTP_PASS"
          
          echo "✅ Email notification ready (dry run - enable with secrets)"
          echo "   Recipients: $NOTIFY_EMAIL"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-fuzzing-results
          path: |
            blackbox-target/unique_crashes/
            blackbox-target/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Final Summary
        run: |
          echo "## 🎯 BlackBox Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tool** | AFL++ (QEMU mode) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | 180 sec |" >> $GITHUB_STEP_SUMMARY
          echo "| **Raw crashes** | ${{ steps.analyze.outputs.raw_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unique crashes** | ${{ steps.analyze.outputs.unique_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duplicates** | ${{ steps.analyze.outputs.duplicates }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dedup rate** | ${{ steps.analyze.outputs.dedup_rate }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **No external API calls** - all processing is local" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **No data sent to third parties**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Artifacts stored in GitHub (private repo)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎫 Integrations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.JIRA_URL }}" ]; then
            echo "- ✅ Jira tickets created" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Jira not configured (add secrets)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ secrets.DD_URL }}" ]; then
            echo "- ✅ DefectDojo upload complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ️ DefectDojo not configured (add secrets)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ secrets.SMTP_SERVER }}" ]; then
            echo "- ✅ Email notifications sent" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Email not configured (add secrets)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Crash files: \`unique_crashes/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Report: \`reports/fuzzing_report.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- Retention: 30 days" >> $GITHUB_STEP_SUMMARY
