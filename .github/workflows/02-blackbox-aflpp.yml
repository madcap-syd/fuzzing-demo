name: 02-BlackBox-Fuzzing

on:
  push:
    branches: [main]

env:
  JIRA_URL: ${{ secrets.JIRA_URL }}
  JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
  JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
  DD_URL: ${{ secrets.DD_URL }}
  DD_API_KEY: ${{ secrets.DD_API_KEY }}
  DD_PRODUCT_ID: ${{ secrets.DD_PRODUCT_ID }}
  EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 python3-pip wget
          sudo apt-get install -y pkg-config libglib2.0-dev libpixman-1-dev
          sudo apt-get install -y meson ninja-build
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          make distrib -j$(nproc)
          sudo make install
          cd qemu_mode
          ./build_qemu_support.sh

      - name: Fix core_pattern
        run: echo "core" | sudo tee /proc/sys/kernel/core_pattern

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          echo "AAAA" > corpus/seed2.txt

      - name: Run AFL++
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Analyze and Deduplicate
        id: analyze
        run: |
          cd blackbox-target
          mkdir -p unique_crashes reports
          
          RAW_COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
          echo "Raw crashes: $RAW_COUNT"
          
          UNIQUE_COUNT=0
          declare -A seen_hashes
          
          for f in afl_out/default/crashes/*; do
            if [ -f "$f" ]; then
              hash=$(md5sum "$f" | cut -d' ' -f1)
              size=$(stat -c%s "$f")
              key="${hash}_${size}"
              
              if [ -z "${seen_hashes[$key]}" ]; then
                seen_hashes[$key]=1
                UNIQUE_COUNT=$((UNIQUE_COUNT + 1))
                safe_name="crash_$(printf '%06d' $UNIQUE_COUNT)_size_${size}.txt"
                cp "$f" "unique_crashes/$safe_name"
              fi
            fi
          done
          
          DUPLICATES=$((RAW_COUNT - UNIQUE_COUNT))
          DEDUP_RATE=0
          [ "$RAW_COUNT" -gt 0 ] && DEDUP_RATE=$((DUPLICATES * 100 / RAW_COUNT))
          
          echo "raw_count=$RAW_COUNT" >> $GITHUB_OUTPUT
          echo "unique_count=$UNIQUE_COUNT" >> $GITHUB_OUTPUT
          echo "duplicates=$DUPLICATES" >> $GITHUB_OUTPUT
          echo "dedup_rate=$DEDUP_RATE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=== DEDUPLICATION ==="
          echo "Raw: $RAW_COUNT"
          echo "Unique: $UNIQUE_COUNT"
          echo "Duplicates: $DUPLICATES (${DEDUP_RATE}%)"
          
          cat > reports/fuzzing_report.json <<JSONEOF
{
  "tool": "AFL++",
  "duration": 180,
  "raw_crashes": $RAW_COUNT,
  "unique_crashes": $UNIQUE_COUNT,
  "duplicates": $DUPLICATES,
  "dedup_rate": $DEDUP_RATE
}
JSONEOF

      - name: Create Jira Tickets
        if: steps.analyze.outputs.unique_count > 0 && env.JIRA_URL != ''
        run: |
          echo "Creating Jira tickets..."
          
          for i in $(seq 1 ${{ steps.analyze.outputs.unique_count }}); do
            crash_file=$(ls unique_crashes/crash_$(printf '%06d' $i)_size_*.txt 2>/dev/null | head -1)
            size=$(stat -c%s "$crash_file" 2>/dev/null || echo "0")
            
            echo "Creating ticket for crash #$i..."
            
            cat > /tmp/jira_$i.json <<JIRAEOL
{
  "fields": {
    "project": {"key": "$JIRA_PROJECT"},
    "summary": "Fuzzing: Crash #$i - Buffer Overflow",
    "description": "AFL++ detected crash #$i\n\nSize: $size bytes\nSeverity: Critical\nCWE: 120",
    "issuetype": {"name": "Bug"},
    "priority": {"name": "Highest"},
    "labels": ["fuzzing", "security", "aflpp"]
  }
}
JIRAEOL
            
            curl -u "$JIRA_TOKEN" -X POST -H "Content-Type: application/json" \
              --data @/tmp/jira_$i.json "$JIRA_URL/rest/api/2/issue" || true
          done
          
          echo "Created ${{ steps.analyze.outputs.unique_count }} Jira tickets"

      - name: Upload to DefectDojo
        if: steps.analyze.outputs.unique_count > 0 && env.DD_URL != ''
        run: |
          echo "Uploading to DefectDojo..."
          
          cat > /tmp/dd_report.json <<DDEOF
{
  "title": "AFL++ Fuzzing - $(date +%Y-%m-%d)",
  "description": "Found ${{ steps.analyze.outputs.unique_count }} unique crashes",
  "severity": "Critical",
  "cwe": 120,
  "cvssv3": 9.8,
  "file_path": "blackbox-target/target",
  "active": true,
  "verified": true
}
DDEOF
          
          curl -X POST "$DD_URL/api/v2/findings/" \
            -H "Authorization: Token $DD_API_KEY" \
            -H "Content-Type: application/json" \
            --data @/tmp/dd_report.json || true
          
          echo "Uploaded to DefectDojo"

      - name: Send Email Notifications
        if: steps.analyze.outputs.unique_count > 0 && env.EMAIL_RECIPIENTS != ''
        run: |
          echo "Sending email notifications..."
          
          cat > /tmp/email.txt <<EMAILEOF
Subject: [SECURITY] Fuzzing Alert - ${{ steps.analyze.outputs.unique_count }} Crashes

Fuzzing detected ${{ steps.analyze.outputs.unique_count }} unique crashes.

Raw crashes: ${{ steps.analyze.outputs.raw_count }}
Unique crashes: ${{ steps.analyze.outputs.unique_count }}
Dedup rate: ${{ steps.analyze.outputs.dedup_rate }}%

See GitHub Actions for details.
EMAILEOF
          
          echo "Email would be sent to: $EMAIL_RECIPIENTS"
          echo "Email notification ready"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results
          path: |
            blackbox-target/unique_crashes/
            blackbox-target/reports/
          retention-days: 30

      - name: Summary
        run: |
          echo "## BlackBox Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | AFL++ (QEMU) |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | 180 sec |" >> $GITHUB_STEP_SUMMARY
          echo "| Raw crashes | ${{ steps.analyze.outputs.raw_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unique | ${{ steps.analyze.outputs.unique_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dedup rate | ${{ steps.analyze.outputs.dedup_rate }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integrations" >> $GITHUB_STEP_SUMMARY
          if [ -n "$JIRA_URL" ]; then
            echo "- Jira: Enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Jira: Not configured" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$DD_URL" ]; then
            echo "- DefectDojo: Enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- DefectDojo: Not configured" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "$EMAIL_RECIPIENTS" ]; then
            echo "- Email: Enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Email: Not configured" >> $GITHUB_STEP_SUMMARY
          fi
