name: 02-BlackBox-Fuzzing (AFL++ Real)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install AFL++ from source (with QEMU)
        run: |
          echo " Installing dependencies..."
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 python3-pip wget pkg-config libglib2.0-dev libpixman-1-dev libtool libtool-bin autoconf automake
          
          # ИСПРАВЛЕНИЕ: Устанавливаем Meson и Ninja
          sudo apt-get install -y meson ninja-build
          
          echo " Cloning AFL++..."
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          
          echo " Building AFL++..."
          make distrib -j$(nproc)
          sudo make install
          
          echo " Building QEMU mode..."
          cd qemu_mode
          ./build_qemu_support.sh
          
          echo " AFL++ installed successfully!"
          afl-fuzz --version
      
      - name: Fix core_pattern
        run: |
          echo "core" | sudo tee /proc/sys/kernel/core_pattern
      
      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
      
      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          python3 -c "print('B'*200)" > corpus/seed.txt
      
      - name: Run AFL++ (120 sec)
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 120s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true
      
      - name: Show Results
        run: |
          cd blackbox-target
          if [ -d "afl_out/default/crashes" ]; then
            COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
            echo "🎯 Found $COUNT crashes!"
            ls -lh afl_out/default/crashes/ | head -10
            echo "## 🎯 AFL++ Found $COUNT Crashes" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh afl_out/default/crashes/ | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No crashes found"
            echo "## ️ No crashes" >> $GITHUB_STEP_SUMMARY
          fi
