name: 02-BlackBox-Fuzzing

on:
  push:
    branches: [main]

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 wget
          sudo apt-get install -y pkg-config libglib2.0-dev libpixman-1-dev
          sudo apt-get install -y meson ninja-build
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          make distrib -j$(nproc)
          sudo make install
          cd qemu_mode
          ./build_qemu_support.sh

      - name: Fix core_pattern
        run: echo "core" | sudo tee /proc/sys/kernel/core_pattern

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed.txt

      - name: Run AFL++
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Count Crashes
        id: count
        run: |
          cd blackbox-target
          COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
          echo "crash_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT crashes"

      - name: Summary
        run: |
          echo "## AFL++ Results" >> $GITHUB_STEP_SUMMARY
          echo "Crashes: ${{ steps.count.outputs.crash_count }}" >> $GITHUB_STEP_SUMMARY
