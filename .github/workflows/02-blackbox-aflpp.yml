name: 02-BlackBox-Fuzzing

on:
  push:
    branches: [main]

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AFL++
        run: |
          sudo apt-get update
          sudo apt-get install -y git make gcc clang llvm python3 python3-pip wget
          sudo apt-get install -y pkg-config libglib2.0-dev libpixman-1-dev
          sudo apt-get install -y meson ninja-build
          cd /tmp
          git clone https://github.com/AFLplusplus/AFLplusplus.git
          cd AFLplusplus
          make distrib -j$(nproc)
          sudo make install
          cd qemu_mode
          ./build_qemu_support.sh

      - name: Fix core_pattern
        run: echo "core" | sudo tee /proc/sys/kernel/core_pattern

      - name: Build Target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
          strip target

      - name: Create Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus
          echo "test" > corpus/seed1.txt
          echo "AAAA" > corpus/seed2.txt

      - name: Run AFL++
        run: |
          set +e
          cd blackbox-target
          export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
          export AFL_SKIP_CPUFREQ=1
          timeout 180s afl-fuzz -i corpus -o afl_out -Q -- ./target @@ || true

      - name: Analyze and Deduplicate
        id: analyze
        run: |
          cd blackbox-target
          mkdir -p unique_crashes reports
          
          RAW_COUNT=$(ls -1 afl_out/default/crashes 2>/dev/null | wc -l)
          echo "Raw crashes: $RAW_COUNT"
          
          UNIQUE_COUNT=0
          declare -A seen_hashes
          
          for f in afl_out/default/crashes/*; do
            if [ -f "$f" ]; then
              hash=$(md5sum "$f" | cut -d' ' -f1)
              size=$(stat -c%s "$f")
              key="${hash}_${size}"
              
              if [ -z "${seen_hashes[$key]}" ]; then
                seen_hashes[$key]=1
                UNIQUE_COUNT=$((UNIQUE_COUNT + 1))
                safe_name="crash_$(printf '%06d' $UNIQUE_COUNT)_size_${size}.txt"
                cp "$f" "unique_crashes/$safe_name"
              fi
            fi
          done
          
          DUPLICATES=$((RAW_COUNT - UNIQUE_COUNT))
          DEDUP_RATE=0
          [ "$RAW_COUNT" -gt 0 ] && DEDUP_RATE=$((DUPLICATES * 100 / RAW_COUNT))
          
          echo "raw_count=$RAW_COUNT" >> $GITHUB_OUTPUT
          echo "unique_count=$UNIQUE_COUNT" >> $GITHUB_OUTPUT
          echo "duplicates=$DUPLICATES" >> $GITHUB_OUTPUT
          echo "dedup_rate=$DEDUP_RATE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=== DEDUPLICATION ==="
          echo "Raw: $RAW_COUNT"
          echo "Unique: $UNIQUE_COUNT"
          echo "Duplicates: $DUPLICATES (${DEDUP_RATE}%)"
          
          echo '{"tool":"AFL++","raw":'$RAW_COUNT',"unique":'$UNIQUE_COUNT',"dedup":'$DUPLICATES'}' > reports/fuzzing_report.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results
          path: |
            blackbox-target/unique_crashes/
            blackbox-target/reports/
          retention-days: 30

      - name: Summary
        run: |
          echo "## BlackBox Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | AFL++ (QEMU) |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | 180 sec |" >> $GITHUB_STEP_SUMMARY
          echo "| Raw crashes | ${{ steps.analyze.outputs.raw_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unique | ${{ steps.analyze.outputs.unique_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dedup rate | ${{ steps.analyze.outputs.dedup_rate }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Jira/DefectDojo integration: Add secrets to enable" >> $GITHUB_STEP_SUMMARY
          echo "- See artifacts for crash files" >> $GITHUB_STEP_SUMMARY
