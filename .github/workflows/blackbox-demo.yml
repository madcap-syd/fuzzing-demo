name: Black Box Demo - GUARANTEED CRASHES

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  blackbox-demo:
    name: Black Box Fuzzing Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O2 -fno-stack-protector -z execstack -o target vulnerable.c
          chmod +x target
          echo "Target built:"
          file target
      
      - name: Create corpus
        run: |
          mkdir -p corpus crashes
          echo "test" > corpus/input1.txt
          echo "AAAA" > corpus/input2.txt
          # Длинная строка > 64 байт вызовет buffer overflow
          python3 -c "print('A' * 200)" > corpus/large.txt
          echo "CRASH" > corpus/crash.txt
      
      - name: Run Black Box Fuzzing (300 iterations)
        id: fuzz
        run: |
          cd blackbox-target
          CRASH_COUNT=0
          
          echo "Starting Black Box Fuzzing..."
          echo "Target: ./target"
          echo "Iterations: 300"
          echo ""
          
          for i in $(seq 1 300); do
            # Берём случайный input
            SEED=$(ls ../corpus | shuf -n 1)
            
            # Мутируем
            cp ../corpus/$SEED /tmp/mutated.txt
            
            # Добавляем случайные данные
            RANDOM_SIZE=$((RANDOM % 150 + 50))
            dd if=/dev/urandom bs=1 count=$RANDOM_SIZE >> /tmp/mutated.txt 2>/dev/null
            
            # Запускаем
            timeout 1s ./target /tmp/mutated.txt > /dev/null 2>&1
            EXIT_CODE=$?
            
            # Проверяем краш
            if [ $EXIT_CODE -eq 134 ] || [ $EXIT_CODE -eq 139 ]; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "CRASH #$CRASH_COUNT! Exit: $EXIT_CODE (iter $i)"
              cp /tmp/mutated.txt crashes/crash_$(printf "%03d" $CRASH_COUNT).txt
            fi
            
            # Прогресс
            if [ $((i % 50)) -eq 0 ]; then
              echo "Progress: $i/300 | Crashes: $CRASH_COUNT"
            fi
          done
          
          echo ""
          echo "Fuzzing completed!"
          echo "Total crashes: $CRASH_COUNT"
          echo "count=$CRASH_COUNT" >> $GITHUB_OUTPUT
      
      - name: Show crash files
        if: steps.fuzz.outputs.count > 0
        run: |
          cd blackbox-target
          echo ""
          echo "CRASH FILES:"
          ls -lh crashes/ | head -20
          
          UNIQUE=$(ls -1 crashes/ | wc -l)
          echo ""
          echo "Total unique files: $UNIQUE"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-crashes
          path: |
            blackbox-target/crashes/
            blackbox-target/corpus/
          retention-days: 30
