name: Simple Fuzzing Demo

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t fuzzing-demo:latest .
          echo "✅ Docker image built successfully"
      
      - name: Run libFuzzer
        run: |
          mkdir -p crashes
          docker run --rm \
            -v $(pwd)/crashes:/build/crashes \
            fuzzing-demo:latest \
            ./fuzz_target ./corpus \
              -artifact_prefix=./crashes/ \
              -max_total_time=60 2>&1 | tee fuzzing.log
      
      - name: Show crash info
        run: |
          echo "=== FUZZING LOG ==="
          cat fuzzing.log | grep -A 20 "AddressSanitizer" || echo "No crash found"
          
          echo ""
          echo "=== CRASH FILES ==="
          ls -lh crashes/ || echo "No crashes"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-results
          path: |
            crashes/
            fuzzing.log
