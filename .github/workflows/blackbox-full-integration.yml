name: Black Box Full Integration

on:
  push:
    branches: ["**"]

jobs:
  blackbox-integration:
    name: Black Box with Dojo & Jira
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
      
      - name: Create corpus
        run: |
          cd blackbox-target
          mkdir -p corpus crashes
          echo "test" > corpus/small.txt
          python3 -c "print('A' * 100)" > corpus/medium.txt
          python3 -c "print('B' * 200)" > corpus/large.txt
      
      - name: Run Black Box Fuzzing
        id: fuzz
        run: |
          set +e
          cd blackbox-target
          CRASH_COUNT=0
          
          for i in $(seq 1 300); do
            SEED=$(ls corpus | shuf -n 1)
            cp corpus/$SEED /tmp/mutated.txt
            dd if=/dev/urandom bs=1 count=$((RANDOM % 200)) >> /tmp/mutated.txt 2>/dev/null
            
            timeout 1s ./target /tmp/mutated.txt > /dev/null 2>&1
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 134 ]; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              cp /tmp/mutated.txt crashes/crash_$(printf "%03d" $CRASH_COUNT).txt
            fi
            
            if [ $((i % 50)) -eq 0 ]; then
              echo "Progress: $i/300 | Crashes: $CRASH_COUNT"
            fi
          done
          
          echo "Total crashes: $CRASH_COUNT"
          echo "count=$CRASH_COUNT" >> $GITHUB_OUTPUT
          set -e
      
      - name: Deduplicate crashes
        id: dedup
        run: |
          cd blackbox-target
          mkdir -p unique-crashes
          
          declare -A sizes
          for crash in crashes/crash_*; do
            if [ -f "$crash" ]; then
              size=$(stat -c%s "$crash")
              if [ -z "${sizes[$size]}" ]; then
                sizes[$size]="$crash"
                cp "$crash" unique-crashes/
              fi
            fi
          done
          
          UNIQUE=$(ls -1 unique-crashes/ | wc -l)
          TOTAL=$(ls -1 crashes/ | wc -l)
          
          echo "=== DEDUPLICATION RESULTS ==="
          echo "Total crashes: $TOTAL"
          echo "Unique crashes: $UNIQUE"
          echo "Duplicates: $((TOTAL - UNIQUE))"
          echo "Deduplication rate: $(( (TOTAL - UNIQUE) * 100 / TOTAL ))%"
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "unique=$UNIQUE" >> $GITHUB_OUTPUT
      
      - name: Create DefectDojo Finding
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          TOTAL=${{ steps.dedup.outputs.total }}
          
          echo "=== DEFECTDOJO INTEGRATION ==="
          echo "Creating finding for $UNIQUE unique crashes..."
          
          python3 -c "
import json
finding = {
    'title': '[BLACK BOX] Buffer Overflow - $UNIQUE unique crashes',
    'description': 'Black Box fuzzing found $UNIQUE unique crashes out of $TOTAL total',
    'severity': 'Critical',
    'cwe': 120,
    'cvss': 9.8,
    'file_path': 'blackbox-target/vulnerable.c',
    'line': 8
}
with open('defectdojo-finding.json', 'w') as f:
    json.dump(finding, f, indent=2)
print('Finding created:')
print(json.dumps(finding, indent=2))
"
      
      - name: Create Jira Ticket
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          
          echo "=== JIRA INTEGRATION ==="
          echo "Creating ticket for $UNIQUE unique crashes..."
          
          python3 -c "
import json
ticket = {
    'project': 'SEC',
    'summary': '[BLACK BOX] Critical Buffer Overflow - $UNIQUE unique crashes',
    'priority': 'Highest',
    'type': 'Bug',
    'labels': ['security', 'blackbox', 'afl']
}
with open('jira-ticket.json', 'w') as f:
    json.dump(ticket, f, indent=2)
print('Ticket created:')
print(json.dumps(ticket, indent=2))
"
      
      - name: Send Email
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          
          echo "=== EMAIL NOTIFICATION ==="
          echo "Sending email to security-team@company.com..."
          
          cat > email.txt << EMAILEOF
Subject: CRITICAL: Black Box found $UNIQUE unique crashes

Black Box fuzzing discovered critical vulnerabilities!

Total crashes: ${{ steps.dedup.outputs.total }}
Unique crashes: $UNIQUE
Deduplication rate: $(( (${{ steps.dedup.outputs.total }} - $UNIQUE) * 100 / ${{ steps.dedup.outputs.total }} ))%

Vulnerability: Buffer Overflow (CWE-120)
CVSS: 9.8 (Critical)

Pipeline: https://github.com/madcap-syd/fuzzing-demo/actions/runs/${{ github.run_id }}
EMAILEOF
          
          echo "Email content:"
          cat email.txt
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-results
          path: |
            blackbox-target/crashes/
            blackbox-target/unique-crashes/
            blackbox-target/defectdojo-finding.json
            blackbox-target/jira-ticket.json
            blackbox-target/email.txt
