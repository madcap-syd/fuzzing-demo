name: Black Box Demo - Simple

on:
  push:
    branches: ["**"]

jobs:
  blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -o target vulnerable.c
      
      - name: Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus crashes
          echo "test" > corpus/small.txt
          python3 -c "print('A'*100)" > corpus/medium.txt
          python3 -c "print('B'*200)" > corpus/large.txt
      
      - name: Fuzz
        id: fuzz
        run: |
          set +e
          cd blackbox-target
          COUNT=0
          for i in {1..300}; do
            cp corpus/medium.txt /tmp/test.txt
            dd if=/dev/urandom bs=1 count=50 >> /tmp/test.txt 2>/dev/null
            timeout 1s ./target /tmp/test.txt >/dev/null 2>&1
            if [ $? -eq 139 ] || [ $? -eq 134 ]; then
              COUNT=$((COUNT+1))
              cp /tmp/test.txt crashes/crash_$COUNT.txt
            fi
          done
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT crashes"
      
      - name: Deduplicate
        run: |
          cd blackbox-target
          mkdir -p unique
          for f in crashes/*.txt; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            cp "$f" "unique/size_$size.txt" 2>/dev/null
          done
          UNIQUE=$(ls unique/ 2>/dev/null | wc -l)
          echo "Unique crashes: $UNIQUE"
          echo "unique=$UNIQUE" >> $GITHUB_OUTPUT
      
      - name: DefectDojo
        run: |
          echo "Creating DefectDojo finding..."
          echo '{"title":"Black Box Buffer Overflow","cwe":120,"cvss":9.8}' > dojo.json
          cat dojo.json
      
      - name: Jira
        run: |
          echo "Creating Jira ticket..."
          echo '{"project":"SEC","summary":"Buffer Overflow found"}' > jira.json
          cat jira.json
      
      - name: Email
        run: |
          echo "Sending email notification..."
          echo "To: security-team@company.com"
          echo "Subject: Critical vulnerability found"
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-results
          path: |
            blackbox-target/crashes/
            blackbox-target/unique/
            blackbox-target/dojo.json
            blackbox-target/jira.json
