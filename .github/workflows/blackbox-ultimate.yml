name: Black Box Ultimate Pipeline

on:
  push:
    branches: ["**"]

jobs:
  blackbox-ultimate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -o target vulnerable.c
      
      - name: Corpus
        run: |
          cd blackbox-target
          mkdir -p corpus crashes unique reports
          echo "test" > corpus/small.txt
          python3 -c "print('A'*100)" > corpus/medium.txt
          python3 -c "print('B'*200)" > corpus/large.txt
      
      - name: Fuzz
        id: fuzz
        run: |
          set +e
          cd blackbox-target
          COUNT=0
          for i in {1..300}; do
            cp corpus/large.txt /tmp/test.txt
            dd if=/dev/urandom bs=1 count=50 >> /tmp/test.txt 2>/dev/null
            timeout 1s ./target /tmp/test.txt >/dev/null 2>&1
            if [ $? -eq 139 ] || [ $? -eq 134 ]; then
              COUNT=$((COUNT+1))
              cp /tmp/test.txt crashes/crash_$COUNT.txt
            fi
          done
          echo "Found $COUNT crashes"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          set -e
      
      - name: Deduplicate
        id: dedup
        run: |
          cd blackbox-target
          mkdir -p unique
          ls crashes/*.txt 2>/dev/null | while read f; do
            size=$(stat -c%s "$f")
            if [ ! -f "unique/size_$size.txt" ]; then
              cp "$f" "unique/size_$size.txt"
            fi
          done
          UNIQUE=$(ls unique/ 2>/dev/null | wc -l)
          TOTAL=$(ls crashes/ 2>/dev/null | wc -l)
          echo "Total crashes: $TOTAL"
          echo "Unique crashes: $UNIQUE"
          echo "Duplicates: $((TOTAL - UNIQUE))"
          echo "unique=$UNIQUE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      
      - name: DefectDojo
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          TOTAL=${{ steps.dedup.outputs.total }}
          echo "Creating DefectDojo finding..."
          echo '{"title":"[BLACK BOX] Buffer Overflow","cwe":120,"cvss":9.8,"severity":"Critical","total_crashes":"'"$TOTAL"'","unique_crashes":"'"$UNIQUE"'"}' > reports/defectdojo.json
          echo "Finding:"
          cat reports/defectdojo.json
      
      - name: Jira
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          echo "Creating Jira ticket..."
          echo '{"project":"SEC","summary":"[BLACK BOX] Critical Buffer Overflow - '"$UNIQUE"' unique crashes","priority":"Highest","type":"Bug","labels":["security","blackbox","cwe-120"]}' > reports/jira.json
          echo "Ticket:"
          cat reports/jira.json
      
      - name: Email
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          TOTAL=${{ steps.dedup.outputs.total }}
          echo "Sending email..."
          echo "To: security-team@company.com" > reports/email.txt
          echo "Subject: [BLACK BOX] Found $UNIQUE unique vulnerabilities" >> reports/email.txt
          echo "" >> reports/email.txt
          echo "SUMMARY:" >> reports/email.txt
          echo "- Total crashes: $TOTAL" >> reports/email.txt
          echo "- Unique: $UNIQUE" >> reports/email.txt
          echo "- CWE: 120 (Buffer Overflow)" >> reports/email.txt
          echo "- CVSS: 9.8 (Critical)" >> reports/email.txt
          cat reports/email.txt
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-ultimate
          path: |
            blackbox-target/crashes/
            blackbox-target/unique/
            blackbox-target/reports/
