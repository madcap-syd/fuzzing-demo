name: Black Box Ultimate Pipeline

on:
  push:
    branches: ["**"]

jobs:
  blackbox-ultimate:
    name: Fuzzing + Dedup + Dojo + Jira + Email
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
      
      - name: Create corpus
        run: |
          cd blackbox-target
          mkdir -p corpus crashes unique reports
          echo "test" > corpus/small.txt
          python3 -c "print('A'*100)" > corpus/medium.txt
          python3 -c "print('B'*200)" > corpus/large.txt
          python3 -c "print('C'*500)" > corpus/huge.txt
      
      - name: Step 1 - Fuzzing (300 iterations)
        id: fuzz
        run: |
          set +e
          cd blackbox-target
          COUNT=0
          for i in {1..300}; do
            cp corpus/large.txt /tmp/test.txt
            dd if=/dev/urandom bs=1 count=$((RANDOM % 100)) >> /tmp/test.txt 2>/dev/null
            timeout 1s ./target /tmp/test.txt >/dev/null 2>&1
            if [ $? -eq 139 ] || [ $? -eq 134 ]; then
              COUNT=$((COUNT+1))
              cp /tmp/test.txt crashes/crash_$COUNT.txt
            fi
          done
          echo "Found $COUNT crashes"
          echo "total=$COUNT" >> $GITHUB_OUTPUT
          set -e
      
      - name: Step 2 - Deduplication
        id: dedup
        run: |
          cd blackbox-target
          mkdir -p unique
          declare -A sizes
          for f in crashes/crash_*.txt; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ -z "${sizes[$size]}" ]; then
              sizes[$size]="$f"
              cp "$f" unique/unique_$(printf "%04d" ${#sizes[@]}).txt
            fi
          done
          UNIQUE=$(ls unique/ 2>/dev/null | wc -l)
          TOTAL=${{ steps.fuzz.outputs.total }}
          DUPS=$((TOTAL - UNIQUE))
          RATE=$(( (DUPS * 100) / TOTAL ))
          echo "=== DEDUPLICATION ==="
          echo "Total: $TOTAL"
          echo "Unique: $UNIQUE"
          echo "Duplicates: $DUPS"
          echo "Rate: ${RATE}%"
          echo "unique=$UNIQUE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "rate=${RATE}%" >> $GITHUB_OUTPUT
      
      - name: Step 3 - DefectDojo Finding
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          TOTAL=${{ steps.dedup.outputs.total }}
          RATE=${{ steps.dedup.outputs.rate }}
          echo "=== DEFECTDOJO ==="
          python3 -c "
import json
findings = []
for i in range(1, $UNIQUE + 1):
    findings.append({
        'title': f'[BLACK BOX] Buffer Overflow #{i}',
        'description': f'Total crashes: $TOTAL\\nUnique: $UNIQUE\\nDedup rate: $RATE',
        'severity': 'Critical',
        'cwe': 120,
        'cvssv3_score': 9.8,
        'file_path': 'blackbox-target/vulnerable.c',
        'active': True,
        'verified': False,
        'tags': ['blackbox', 'fuzzing']
    })
with open('reports/defectdojo_findings.json', 'w') as f:
    json.dump(findings, f, indent=2)
print(f'Created {len(findings)} findings')
"
      
      - name: Step 4 - Jira Tickets
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          echo "=== JIRA ==="
          python3 -c "
import json
tickets = []
for i in range(1, $UNIQUE + 1):
    tickets.append({
        'project': 'SEC',
        'summary': f'[BLACK BOX] Critical Buffer Overflow #{i}',
        'priority': 'Highest',
        'type': 'Bug',
        'labels': ['security', 'blackbox', 'cwe-120']
    })
with open('reports/jira_tickets.json', 'w') as f:
    json.dump(tickets, f, indent=2)
print(f'Created {len(tickets)} tickets')
"
      
      - name: Step 5 - Email Notification
        run: |
          cd blackbox-target
          UNIQUE=${{ steps.dedup.outputs.unique }}
          TOTAL=${{ steps.dedup.outputs.total }}
          RATE=${{ steps.dedup.outputs.rate }}
          echo "=== EMAIL ==="
          cat > reports/email.txt << EMAILEOF
To: security-team@company.com
Subject: [BLACK BOX] Found $UNIQUE unique vulnerabilities

SUMMARY:
- Total crashes: $TOTAL
- Unique: $UNIQUE
- Dedup rate: $RATE
- CWE: 120 (Buffer Overflow)
- CVSS: 9.8 (Critical)

Pipeline: https://github.com/madcap-syd/fuzzing-demo/actions/runs/${{ github.run_id }}
EMAILEOF
          cat reports/email.txt
      
      - name: Step 6 - Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-ultimate-results
          path: |
            blackbox-target/crashes/
            blackbox-target/unique/
            blackbox-target/reports/
          retention-days: 30
