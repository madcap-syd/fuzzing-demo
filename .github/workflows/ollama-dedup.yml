name: Ollama-Powered Deduplication

on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  ollama-dedup:
    name: AI-Powered Crash Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -o target vulnerable.c
      
      - name: Run fuzzing
        run: |
          set +e  # НЕ выходим при ошибках!
          cd blackbox-target
          mkdir -p corpus crashes
          python3 -c "print('B'*200)" > corpus/large.txt
          
          COUNT=0
          for i in {1..100}; do
            cp corpus/large.txt /tmp/test.txt
            dd if=/dev/urandom bs=1 count=50 >> /tmp/test.txt 2>/dev/null
            timeout 1s ./target /tmp/test.txt >/dev/null 2>&1 || true
            if [ $? -eq 139 ] || [ $? -eq 134 ]; then
              COUNT=$((COUNT+1))
              cp /tmp/test.txt crashes/crash_$COUNT.txt
            fi
          done
          echo "✅ Found $COUNT crashes"
          echo "crash_count=$COUNT" >> $GITHUB_OUTPUT
        id: fuzz
      
      - name: Install Python dependencies
        run: pip install requests
      
      - name: Run Ollama Deduplication
        run: |
          cd blackbox-target
          echo "=== OLLAMA SEMANTIC DEDUP ==="
          python3 ../scripts/ollama-dedup.py crashes
          echo ""
          echo "=== RESULTS ==="
          cat reports/ollama_bugs.json
        id: ollama
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ollama-analysis-results
          path: blackbox-target/reports/
          retention-days: 7
      
      - name: Summary
        run: |
          echo "## 🦙 Ollama AI Deduplication Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total crashes found:** ${{ steps.fuzz.outputs.crash_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AI Analysis:**" >> $GITHUB_STEP_SUMMARY
          cat blackbox-target/reports/ollama_bugs.json >> $GITHUB_STEP_SUMMARY
