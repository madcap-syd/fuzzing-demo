name: Ollama-Powered Deduplication

on:
  workflow_dispatch:  # Запуск вручную для demo
  push:
    branches: ["**"]

jobs:
  ollama-dedup:
    name: AI-Powered Crash Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -o target vulnerable.c
      
      - name: Run fuzzing
        run: |
          cd blackbox-target
          mkdir -p corpus crashes
          python3 -c "print('B'*200)" > corpus/large.txt
          
          for i in {1..300}; do
            cp corpus/large.txt /tmp/test.txt
            dd if=/dev/urandom bs=1 count=50 >> /tmp/test.txt 2>/dev/null
            timeout 1s ./target /tmp/test.txt >/dev/null 2>&1
            if [ $? -eq 139 ]; then
              cp /tmp/test.txt crashes/crash_$i.txt
            fi
          done
      
      - name: Install Ollama
        run: |
          # Устанавливаем Ollama (легковесная версия)
          curl -fsSL https://ollama.com/install.sh | sh
          pip install ollama
          
          # Запускаем Ollama server (background)
          ollama serve &
          sleep 5
          
          # Pull модель (tiny для скорости)
          ollama pull llama3.2:latest
      
      - name: Run Ollama Deduplication
        run: |
          python3 scripts/ollama-dedup.py blackbox-target/crashes llama3.2
      
      - name: Show Results
        run: |
          echo "=== OLLAMA ANALYSIS RESULTS ==="
          cat blackbox-target/reports/ollama_bugs.json | python3 -m json.tool
          echo ""
          echo "=== GENERATED JIRA TICKETS ==="
          cat blackbox-target/reports/ollama_jira_tickets.json | python3 -m json.tool | head -50
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ollama-analysis
          path: blackbox-target/reports/
