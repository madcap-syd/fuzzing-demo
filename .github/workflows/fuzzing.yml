name: Multi-Fuzzer Security Pipeline
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '0 2 * * *'
jobs:
  fuzz-pr-check:
    name: PR-Check (libFuzzer, 10 min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Build Docker image
        run: docker build -t fuzzing-demo:latest .
      - name: Create directories
        run: mkdir -p crashes corpus
      - name: Run libFuzzer (10 min)
        run: |
          docker run --rm \
            --memory=1g --cpus=2 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes:/crashes \
            fuzzing-demo:latest \
            ./fuzz_target ./corpus \
              -artifact_prefix=/crashes/ \
              -max_total_time=600 2>&1 | tee fuzzing.log
      - name: Check crashes
        id: check
        run: |
          if [ "$(ls -A ./crashes/ 2>/dev/null)" ]; then
            echo "❌ CRASHES FOUND"
            ls -la ./crashes/
            echo "has_crashes=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No crashes"
            echo "has_crashes=false" >> $GITHUB_OUTPUT
          fi
      - name: Deduplicate with Ollama
        if: steps.check.outputs.has_crashes == 'true'
        env:
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
          DEMO_MODE: true
        run: python3 scripts/deduplicate_ollama.py ./fuzzing.log ./crashes
      - name: Upload to DefectDojo
        if: steps.check.outputs.has_crashes == 'true'
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEMO_MODE: ${{ secrets.DEFECTDOJO_URL == '' && 'true' || 'false' }}
        run: python3 scripts/upload_defectdojo.py ./fuzzing.log ./crashes
      - name: Create Jira tickets
        if: steps.check.outputs.has_crashes == 'true'
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          DEMO_MODE: ${{ secrets.JIRA_URL == '' && 'true' || 'false' }}
        run: python3 scripts/create_jira.py
      - name: Send email notification
        if: steps.check.outputs.has_crashes == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚨 Security Alert: Crash found"
          body: |
            Fuzzing pipeline found a crash!
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Pipeline: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: security-team@company.com
          from: fuzzing-pipeline@company.com
      - name: Fail pipeline if crashes found
        if: steps.check.outputs.has_crashes == 'true'
        run: |
          echo "❌ Pipeline failed due to crashes"
          exit 1
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crashes
          path: |
            crashes/
            defectdojo_findings.json
            jira_ticket.json
            crashes_db.json
            fuzzing.log
