name: Fuzzing CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration in seconds'
        required: false
        default: '60'

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          binutils-dev \
          libunwind-dev \
          libblocksruntime-dev \
          libdisasm-dev \
          libtool-bin \
          python3-pip
        
        pip3 install requests scikit-learn numpy pandas joblib
    
    - name: Build HonggFuzz
      run: |
        git clone --depth 1 https://github.com/google/honggfuzz.git
        cd honggfuzz
        make -j$(nproc)
        sudo make install
        sudo ldconfig
        cd ..
    
    - name: Build target
      run: |
        cd fuzz-cpp
        clang++ -fsanitize=address,undefined -O1 -g -std=c++17 \
          src/packet_parser.cpp -o fuzzer
        
        # Создаём простой corpus
        mkdir -p corpus
        echo "test input" > corpus/test1.txt
        echo "another test" > corpus/test2.txt
    
    - name: Run LibFuzzer (quick test)
      run: |
        cd fuzz-cpp
        timeout 60 ./fuzzer corpus/ -max_total_time=30 -artifact_prefix=crashes/crash- || true
        
        mkdir -p crashes
        ls -la crashes/ || echo "No crashes found"
    
    - name: Parse results
      run: |
        python3 scripts/parse_honggfuzz_crashes.py \
          --crashes-dir fuzz-cpp/crashes \
          --output fuzz_results.json || echo '{"summary": {"total_crashes": 0}}' > fuzz_results.json
    
    - name: Upload to DefectDojo
      if: always()
      env:
        DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL || 'http://localhost:8080' }}
        DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY || 'test' }}
      run: |
        python3 scripts/upload_to_defectdojo.py \
          --results fuzz_results.json \
          --product "Packet Parser" \
          --engagement "GitHub Actions CI/CD" || echo "DefectDojo upload skipped"
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzzing-results
        path: |
          fuzz_results.json
          fuzz-cpp/crashes/
        if-no-files-found: ignore
