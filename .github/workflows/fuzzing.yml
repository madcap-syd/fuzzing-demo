name: Multi-Fuzzer Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    name: Build Multi-Fuzzer Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (libFuzzer + HonggFuzz)
        run: |
          docker build -t fuzzing-demo:latest .
          echo "✅ Multi-fuzzer image built"

      - name: Test both fuzzers
        run: |
          docker run --rm -e FUZZER=libfuzzer -e FUZZ_TIME=5 fuzzing-demo:latest
          docker run --rm -e FUZZER=honggfuzz -e FUZZ_TIME=5 fuzzing-demo:latest

  fuzz-pr-check:
    name: PR-Check (libFuzzer, 10 min)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run libFuzzer (10 min)
        run: |
          docker run --rm \
            --memory=1g --cpus=2 \
            -e FUZZER=libfuzzer -e FUZZ_TIME=600 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes:/crashes \
            fuzzing-demo:latest || true

      - name: Check crashes
        run: |
          if [ "$(ls -A ./crashes/ 2>/dev/null)" ]; then
            echo "❌ CRASHES FOUND by libFuzzer"
            ls -la ./crashes/
            exit 1
          else
            echo "✅ No crashes"
          fi

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: libfuzzer-crashes
          path: crashes/

  fuzz-nightly:
    name: Nightly (HonggFuzz, 4h)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run HonggFuzz (4 hours)
        run: |
          docker run --rm \
            --memory=2g --cpus=4 \
            -e FUZZER=honggfuzz -e FUZZ_TIME=14400 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes-nightly:/crashes \
            fuzzing-demo:latest || true

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: honggfuzz-results
          path: |
            crashes-nightly/
            corpus/
          retention-days: 30
