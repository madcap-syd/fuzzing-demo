name: Security Fuzzing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly fuzzing at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # ============================================
  # Job 1: Build Docker Image
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t fuzzing-demo:latest .
          echo "✅ Docker image built successfully"

      - name: Test Docker image
        run: |
          docker run --rm fuzzing-demo:latest echo "Docker image works!"

  # ============================================
  # Job 2: PR-Check (Fast Fuzzing)
  # ============================================
  fuzz-pr-check:
    name: PR-Check (10 min fuzzing)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run libFuzzer in Docker (10 minutes)
        run: |
          docker run --rm \
            --name fuzz-pr-check \
            --memory=1g \
            --cpus=2 \
            --pids-limit=100 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes:/crashes \
            fuzzing-demo:latest \
            ./fuzz_target ./corpus \
              -artifact_prefix=/crashes/ \
              -max_total_time=600 \
              -rss_limit_mb=1024 || true

      - name: Check for crashes
        id: check_crashes
        run: |
          if [ "$(ls -A ./crashes/ 2>/dev/null)" ]; then
            echo " CRASHES FOUND"
            echo "has_crashes=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No crashes found"
            echo "has_crashes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-crashes
          path: crashes/
          retention-days: 7

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ' **Fuzzing failed!** Crashes found. Check artifacts for details.'
            })

  # ============================================
  # Job 3: Nightly Deep Fuzzing
  # ============================================
  fuzz-nightly:
    name: Nightly Deep Fuzzing (4 hours)
    needs: build
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run extended fuzzing (4 hours)
        run: |
          docker run --rm \
            --name fuzz-nightly \
            --memory=2g \
            --cpus=4 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes-nightly:/crashes \
            fuzzing-demo:latest \
            ./fuzz_target ./corpus \
              -artifact_prefix=/crashes/ \
              -max_total_time=14400 \
              -jobs=4 \
              -workers=4 || true

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-fuzzing-results
          path: |
            crashes-nightly/
            corpus/
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## Nightly Fuzzing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 Duration: 4 hours" >> $GITHUB_STEP_SUMMARY
          echo "💾 Crashes found: $(ls -1 ./crashes-nightly/ 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "📊 Corpus size: $(du -sh ./corpus/ 2>/dev/null | cut -f1)" >> $GITHUB_STEP_SUMMARY
