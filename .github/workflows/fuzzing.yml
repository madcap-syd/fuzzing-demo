name: Multi-Fuzzer Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    name: Build Multi-Fuzzer Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t fuzzing-demo:latest .
          echo "✅ Docker image built"

  fuzz-pr-check:
    name: PR-Check (libFuzzer, 10 min)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create crashes directory
        run: mkdir -p crashes

      - name: Run libFuzzer (10 min)
        run: |
          docker run --rm \
            --memory=1g --cpus=2 \
            -v ${{ github.workspace }}/corpus:/corpus \
            -v ${{ github.workspace }}/crashes:/crashes \
            fuzzing-demo:latest \
            ./fuzz_target ./corpus \
              -artifact_prefix=/crashes/ \
              -max_total_time=600

      - name: Check crashes
        run: |
          if [ "$(ls -A ./crashes/ 2>/dev/null)" ]; then
            echo " CRASHES FOUND"
            ls -la ./crashes/
            exit 1
          else
            echo "✅ No crashes"
          fi

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crashes
          path: crashes/
