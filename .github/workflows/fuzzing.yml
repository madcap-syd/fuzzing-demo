name: Fuzzing CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration in seconds'
        required: false
        default: '60'

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm python3-pip
        pip3 install requests scikit-learn numpy pandas joblib
    
    - name: Build vulnerable target with LibFuzzer
      run: |
        mkdir -p fuzz-cpp
        cat > fuzz-cpp/simple_vuln.cpp << 'CPPEOF'
        #include <stdio.h>
        #include <string.h>
        #include <stdint.h>
        #include <cstddef>
        
        extern "C" int LLVMFuzzerTestOneInput(const uint8_t* data, size_t size) {
            if (size < 4) return 0;
            char buffer[16];
            if (data[0] == 'A' && size > 16) {
                memcpy(buffer, data, size);
            }
            if (data[0] == 'B' && size > 4) {
                int* ptr = nullptr;
                volatile int x = ptr[0];
            }
            return 0;
        }
        CPPEOF
        
        clang++ -fsanitize=fuzzer,address,undefined -g -O1 -std=c++17 \
          fuzz-cpp/simple_vuln.cpp -o fuzz-cpp/fuzzer
    
    - name: Run LibFuzzer
      run: |
        cd fuzz-cpp
        mkdir -p corpus crashes
        echo "AAAAAAAAAAAAAAAA" > corpus/seed1.bin
        echo "BBBBBBBBBBBBBBBB" > corpus/seed2.bin
        DURATION=${{ github.event.inputs.duration || 60 }}
        timeout $DURATION ./fuzzer corpus/ \
          -max_total_time=30 \
          -artifact_prefix=crashes/crash- || true
        ls -la crashes/ || echo "No crashes"
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzzing-results
        path: fuzz-cpp/crashes/
        if-no-files-found: ignore
