name: Black Box AFL++ with Ollama AI

on:
  push:
    branches: ["**"]

jobs:
  blackbox-afl-ollama:
    name: AFL++ Fuzzing + AI Dedup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install AFL++
        run: sudo apt-get update && sudo apt-get install -y afl++ qemu-user
      
      - name: Build target
        run: |
          cd blackbox-target
          gcc -O0 -fno-stack-protector -z execstack -no-pie -o target vulnerable.c
      
      - name: Run AFL++ Fuzzing (30 sec)
        run: |
          set +e  # НЕ выходим при крашах!
          cd blackbox-target
          mkdir -p corpus afl_output
          python3 -c "print('B'*200)" > corpus/seed.txt
          
          echo "🚀 Запуск AFL++ в QEMU mode..."
          timeout 30s afl-fuzz -i corpus -o afl_output -Q -- ./target @@ || true
          
          echo ""
          echo "=== AFL++ RESULTS ==="
          if [ -d "afl_output/default/crashes" ]; then
            COUNT=$(ls -1 afl_output/default/crashes 2>/dev/null | wc -l)
            echo "✅ AFL++ нашёл: $COUNT крашей"
            echo "crash_count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "️ AFL++ не нашёл крашей"
            echo "crash_count=0" >> $GITHUB_OUTPUT
          fi
        id: afl
      
      - name: Prepare crashes for AI analysis
        run: |
          cd blackbox-target
          mkdir -p crashes_for_ollama
          cp afl_output/default/crashes/* crashes_for_ollama/ 2>/dev/null || true
          echo "Подготовлено файлов: $(ls crashes_for_ollama/ 2>/dev/null | wc -l)"
      
      - name: Run Ollama Deduplication
        run: |
          cd blackbox-target
          echo "=== OLLAMA AI ANALYSIS ==="
          python3 ../scripts/ollama-dedup.py ./crashes_for_ollama
          echo ""
          cat reports/ollama_bugs.json
        id: ollama
      
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: afl-ollama-results
          path: blackbox-target/reports/
      
      - name: Summary
        run: |
          echo "##  AFL++ + Ollama AI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AFL++ crashes:** ${{ steps.afl.outputs.crash_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AI Deduplication:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat blackbox-target/reports/ollama_bugs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
