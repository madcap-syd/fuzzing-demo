name: 01-WhiteBox-Fuzzing (libFuzzer)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  whitebox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang llvm
      
      - name: Build with ASan
        run: |
          echo "🔧 Building WhiteBox target with AddressSanitizer..."
          g++ -fsanitize=address -fno-omit-frame-pointer -g -O1 -c harness.cpp -o harness.o
          echo "✅ Compiled successfully"
          file harness.o
      
      - name: Run libFuzzer (60 sec)
        run: |
          set +e
          echo "⏱️  Running libFuzzer for 60 seconds..."
          
          # Создаём директорию для артефактов
          mkdir -p corpus crashes
          
          # Запускаем libFuzzer
          timeout 60s ./harness.o -max_total_time=60 -artifact_prefix=crashes/ corpus/ || true
          
          echo "✅ libFuzzer finished"
          
          # Считаем краши
          CRASH_COUNT=$(ls -1 crashes/ 2>/dev/null | wc -l)
          echo "crash_count=$CRASH_COUNT" >> $GITHUB_OUTPUT
        id: fuzz
      
      - name: Show Results
        run: |
          echo ""
          echo "=== WHITEBOX FUZZING RESULTS ==="
          echo "Crashes found: ${{ steps.fuzz.outputs.crash_count }}"
          echo ""
          
          if [ "${{ steps.fuzz.outputs.crash_count }}" -gt 0 ]; then
            echo "🎯 Found crashes!"
            ls -lh crashes/
            
            echo ""
            echo "## 🎯 WhiteBox libFuzzer Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Crashes found:** ${{ steps.fuzz.outputs.crash_count }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Crash Files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh crashes/ >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No crashes found (target may be safe)"
            echo "## ✅ WhiteBox: No crashes found" >> $GITHUB_STEP_SUMMARY
          fi
        id: results
      
      - name: Upload Artifacts
        if: steps.fuzz.outputs.crash_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: whitebox-crashes
          path: crashes/
          retention-days: 7
